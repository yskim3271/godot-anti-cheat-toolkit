name: Native Libraries

on:
  workflow_dispatch:
  push:
    paths:
      - "addons/anti_cheat_toolkit/bin/anti_cheat_native.gdextension"
      - "native/**"
      - "scripts/**"
      - ".github/workflows/native-libraries.yml"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SCons
        run: python -m pip install scons
      - name: Fetch godot-cpp
        run: git clone --depth 1 --branch master https://github.com/godotengine/godot-cpp native/thirdparty/godot-cpp
      - name: Build debug DLL
        run: ./scripts/build_windows.ps1 -Target template_debug
      - name: Build release DLL
        run: ./scripts/build_windows.ps1 -Target template_release
      - name: Download Godot 4.6.3
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_win64.exe.zip -OutFile "$env:RUNNER_TEMP/godot.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP/godot.zip" -DestinationPath "$env:RUNNER_TEMP/godot" -Force
      - name: Run Godot headless tests
        shell: pwsh
        run: ./tests/run_godot_tests.ps1 -Godot "$env:RUNNER_TEMP/godot/Godot_v4.6.3-stable_win64_console.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: anti-cheat-native-windows
          path: addons/anti_cheat_toolkit/bin/*.dll
